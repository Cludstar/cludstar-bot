<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cludstar | Command Center</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <header>
            <div class="header-left">
                <img src="logo.jpg?v=3" alt="Cludstar Logo" class="brand-logo">
                <h1>Cludstar</h1>
            </div>
            <div class="mission-status">
                <h3>Dream: 1 SOL <span class="arrow">→</span> 100 SOL</h3>
                <progress id="mission-progress" value="1.5" max="100"></progress>
                <p id="balance-text">Current: 1.5 SOL</p>
                <p id="wallet-text" class="wallet-address"></p>
            </div>
        </header>

        <main class="dashboard-grid">
            <section class="log-panel" id="memory-stream-panel">
                <h2>Memory Stream</h2>
                <div id="memory-logs" class="logs-container">
                    <!-- Memory logs injection here -->
                </div>
            </section>
            <section class="log-panel" id="trade-logs-panel">
                <h2>Logs</h2>
                <div id="trade-logs" class="logs-container">
                    <!-- Trade logs injection here -->
                </div>
            </section>
        </main>
    </div>
    <script src="app.js"></script>
</body>

</html>
