<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CludeStar Trade Agent | Command Center</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <header>
            <div class="header-left">
                <img src="logo.png" alt="CludeStar Logo" class="brand-logo">
                <h1>CludeStar Trade Agent</h1>
            </div>
            <div class="mission-status">
                <h3>Mission: 1 SOL <span class="arrow">→</span> 100 SOL</h3>
                <progress id="mission-progress" value="1.5" max="100"></progress>
                <p id="balance-text">Current: 1.5 SOL</p>
            </div>
        </header>

        <main>
            <section class="log-panel">
                <h2>Memory Stream & Trade Logs</h2>
                <div id="trade-logs" class="logs-container">
                    <!-- Logs injection here -->
                </div>
            </section>
        </main>
    </div>
    <script src="app.js"></script>
</body>

</html>
